<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>中式八球开球测速</title>
<style>
*{box-sizing:border-box;font-size:15px;}
body{padding:20px;width:660px;margin:0 auto;}
.item{margin:8px 0;}
input[type="radio"]{margin-right:6px;}
input{padding:4px;}
.btn{padding:6px 16px;margin:4px;cursor:pointer;}
#res{margin-top:12px;padding:10px;border:1px solid #aaa;min-height:200px;white-space:pre-line;}
</style>
</head>
<body>
<div class="item">
  <label><input type="radio" name="dis" value="1280" checked>1 开球线1280mm</label>
  <label style="margin-left:20px"><input type="radio" name="dis" value="1310">2 偏一颗球1310mm</label>
</div>
<div class="item">
  <label><input type="radio" name="dis" value="1400">3 库边放球1400mm</label>
  <label style="margin-left:20px"><input type="radio" name="dis" value="1600">4 库边手架1600mm</label>
</div>
<div class="item">
  <label><input type="radio" name="dis" value="0">5 自定义距离(mm)</label>
</div>

<div class="item">
  <span>自定距离(mm):</span>
  <input id="userDis" type="text">
</div>

<div class="item">
  <span>输入用时(秒)：</span>
  <input id="timeIn" type="text" onkeydown="if(event.key==='Enter')calc()">
  <button class="btn" onclick="calc()">开始计算</button>
  <button class="btn" onclick="clearData()">清空统计</button>
</div>

<div>计算结果：</div>
<div id="res"></div>

<script>
// 全局变量和C语言完全对应
let g_dis = 1280/1000;
let g_sumMps = 0;
let g_sumKmph = 0;
let g_cnt = 0;
const resDom = document.getElementById('res');
const disInput = document.getElementById('userDis');
const timeInput = document.getElementById('timeIn');
const radios = document.querySelectorAll('input[name="dis"]');

// 单选切换距离
radios.forEach(rd=>{
  rd.onchange = ()=>{
    let val = Number(rd.value);
    if(val!==0){
      g_dis = val/1000;
      disInput.value = "";
    }else{
      //选中自定义，读取输入
      let mm = Number(disInput.value);
      if(!isNaN(mm)&&mm>0){
        g_dis = mm/1000;
      }else{
        resDom.innerText = "请在左侧输入大于0的毫米数！";
      }
    }
  }
})

// 自定义输入框手动改数字同步距离
disInput.oninput = ()=>{
  let sel = document.querySelector('input[name="dis"]:checked');
  if(sel.value==="0"){
    let mm = Number(disInput.value);
    if(!isNaN(mm)&&mm>0) g_dis = mm/1000;
  }
}

// 计算函数 = CalcData
function calc(){
  let t = Number(timeInput.value);
  if(isNaN(t)||t<=0){
    resDom.innerText = "输入无效，请输入大于0的数字！";
    return;
  }
  let vMps = g_dis / t;
  let vKmph = vMps * 3.6;
  g_sumMps += vMps;
  g_sumKmph += vKmph;
  g_cnt++;
  let avgM = g_sumMps/g_cnt;
  let avgK = g_sumKmph/g_cnt;
  resDom.innerText = `本次：${vMps.toFixed(3)} m/s | ${vKmph.toFixed(3)} km/h
累计${g_cnt}组
平均：${avgM.toFixed(3)} m/s | ${avgK.toFixed(3)} km/h`;
  timeInput.value = "";
}

// 清空函数 = ClearAllData
function clearData(){
  g_sumMps=0;g_sumKmph=0;g_cnt=0;
  timeInput.value="";disInput.value="";
  resDom.innerText = "已清空所有统计数据，可重新开始测量";
}
</script>
</body>
</html>
